<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecto-Escape — Análise do Projeto</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    :root {
      --bg: #040b14;
      --panel: rgba(8,18,32,.88);
      --line: rgba(137,202,255,.15);
      --text: #ecf7ff;
      --muted: #8fb0c8;
      --cyan: #57f2ff;
      --mint: #66ffb2;
      --amber: #ffd166;
      --rose: #ff7b89;
      --violet: #8db8ff;
      --shadow: 0 28px 70px rgba(0,0,0,.45);
      --r: 26px; --rs: 18px; --max: 1180px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter','Segoe UI',sans-serif;
      color: var(--text); background: var(--bg); overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 0%, rgba(87,242,255,.13), transparent),
        radial-gradient(ellipse 50% 35% at 85% 0%, rgba(102,255,178,.09), transparent);
    }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(120,197,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,197,255,.04) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow { from { width: 0; } }
    .fade-up   { animation: fadeUp .65s ease both; }
    .fade-up-2 { animation: fadeUp .65s .12s ease both; }
    .fade-up-3 { animation: fadeUp .65s .24s ease both; }

    /* ── Topbar ─────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(18px) saturate(1.3);
      background: rgba(4,10,19,.78);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: var(--max); margin: 0 auto;
      padding: 13px 22px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand {
      font-weight: 900; font-size: .86rem; letter-spacing: .1em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--mint));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav { display: flex; flex-wrap: wrap; gap: 6px; }
    .nav a {
      color: var(--muted); text-decoration: none;
      padding: 7px 12px; border-radius: 999px;
      border: 1px solid transparent; font-size: .9rem; transition: all .16s;
    }
    .nav a:hover { color: var(--text); border-color: var(--line); background: rgba(255,255,255,.05); }

    /* ── Layout ─────────────────────────────────────────────── */
    main {
      max-width: var(--max); margin: 0 auto;
      padding: 28px 20px 100px; position: relative; z-index: 1;
    }
    section {
      margin-bottom: 20px; border: 1px solid var(--line);
      border-radius: var(--r); overflow: hidden;
      background: var(--panel); box-shadow: var(--shadow);
    }
    h2 { font-size: clamp(1.4rem,3vw,2.2rem); font-weight: 900; padding: 28px 28px 0; }
    h3 { font-size: 1rem; color: var(--cyan); font-weight: 700; margin-bottom: 10px; }
    p  { color: var(--muted); line-height: 1.68; margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }
    code {
      font-family: 'Courier New', monospace; color: var(--mint);
      background: rgba(102,255,178,.08); padding: 2px 6px; border-radius: 6px; font-size: .92em;
    }

    /* ── Hero ────────────────────────────────────────────────── */
    .hero {
      padding: 36px 32px;
      background: linear-gradient(140deg, rgba(87,242,255,.08), rgba(141,184,255,.04)), var(--panel);
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 999px;
      border: 1px solid rgba(87,242,255,.25); background: rgba(87,242,255,.07);
      color: var(--cyan); font-size: .78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 18px;
    }
    .eyebrow::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); }
    h1 {
      font-size: clamp(2rem,5vw,4rem); font-weight: 900; line-height: 1.05; margin-bottom: 14px;
      background: linear-gradient(135deg,#fff 40%, var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ── Hero grid ───────────────────────────────────────────── */
    .hero-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-top: 26px; }
    .glass-panel {
      padding: 20px; border-radius: var(--rs);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid var(--line);
    }
    .glass-panel ul { padding-left: 18px; color: var(--muted); line-height: 1.75; }
    .glass-panel li { margin-bottom: 7px; }

    /* ── Stat bar ────────────────────────────────────────────── */
    .stats {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--line);
    }
    .stat { background: var(--panel); padding: 26px 22px; }
    .stat strong { display: block; font-size: 2.5rem; font-weight: 900; color: var(--cyan); line-height: 1; margin-bottom: 7px; }
    .stat span { color: var(--muted); font-size: .92rem; }

    /* ── Status badges ───────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: 999px;
      font-size: .77rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
    .ok   { color: #d8fff0; background: rgba(102,255,178,.1); border: 1px solid rgba(102,255,178,.3); }
    .ok::before   { background: var(--mint); }
    .warn { color: #fff0c5; background: rgba(255,209,102,.1); border: 1px solid rgba(255,209,102,.3); }
    .warn::before { background: var(--amber); }
    .risk { color: #ffd8db; background: rgba(255,123,137,.1); border: 1px solid rgba(255,123,137,.3); }
    .risk::before { background: var(--rose); }

    /* ── Progress bars ───────────────────────────────────────── */
    .prog-list { padding: 22px 28px 30px; display: grid; gap: 14px; }
    .prog-item h3 { font-size: .88rem; color: var(--text); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .prog-item h3 span { color: var(--muted); font-weight: 400; }
    .prog-track { height: 7px; border-radius: 99px; background: rgba(255,255,255,.07); overflow: hidden; }
    .prog-bar { height: 100%; border-radius: 99px; animation: barGrow .8s ease both; }
    .prog-bar.green { background: linear-gradient(90deg, var(--mint), #00e676); }
    .prog-bar.amber { background: linear-gradient(90deg, var(--amber), #ff9800); }
    .prog-bar.cyan  { background: linear-gradient(90deg, var(--cyan), #00b4d8); }
    .prog-bar.rose  { background: linear-gradient(90deg, var(--rose), #ff4d6d); }

    /* ── Grid cards ──────────────────────────────────────────── */
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; padding: 22px 28px 30px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; padding: 22px 28px 30px; }
    .card {
      border: 1px solid var(--line); border-radius: var(--rs);
      background: rgba(255,255,255,.025); padding: 22px;
    }
    .card ul { padding-left: 18px; color: var(--muted); line-height: 1.75; }
    .card li { margin-bottom: 7px; }
    .callout { border: 1px solid var(--line); border-radius: var(--rs); background: rgba(255,255,255,.025); padding: 20px; }

    /* ── Tabela ──────────────────────────────────────────────── */
    table { width: calc(100% - 56px); margin: 8px 28px 30px; border-collapse: collapse; border-radius: var(--rs); overflow: hidden; background: rgba(255,255,255,.025); }
    th, td { padding: 13px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.07); font-size: .93rem; vertical-align: top; }
    th { color: var(--cyan); font-size: .76rem; text-transform: uppercase; letter-spacing: .07em; background: rgba(255,255,255,.03); }
    td { color: var(--muted); }
    tr:last-child td { border-bottom: 0; }
    .ok-cell   { color: #b6ffd8; }
    .warn-cell { color: #ffe7a0; }
    .risk-cell { color: #ffc8cc; }

    /* ── Tag cloud ───────────────────────────────────────────── */
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 10px; padding: 4px 28px 28px; }
    .tag-cloud span {
      padding: 8px 14px; border-radius: 999px;
      background: rgba(141,184,255,.07); border: 1px solid rgba(141,184,255,.2);
      color: #d6e4ff; font-size: .88rem;
    }

    /* ── Quote ───────────────────────────────────────────────── */
    .quote {
      margin: 0 28px 28px;
      padding: 18px 22px;
      border-left: 3px solid var(--cyan);
      background: rgba(87,242,255,.05);
      border-radius: 0 var(--rs) var(--rs) 0;
      font-size: 1.02rem; color: var(--text); line-height: 1.7;
    }
    .foot { padding: 0 28px 28px; color: var(--muted); font-size: .88rem; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 820px) {
      .hero { padding: 24px 18px; }
      .hero-grid, .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      h2, .grid-2, .grid-3, .prog-list, .tag-cloud, .foot { padding-left: 18px; padding-right: 18px; }
      table { width: calc(100% - 36px); margin: 8px 18px 24px; display: block; overflow-x: auto; }
      .quote { margin-left: 18px; margin-right: 18px; }
    }
  </style>
</head>
